<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulas do Fabio Dias</title>
    <link rel="shortcut icon" href="./imgs/fabio.jpg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Atma:wght@300;400;500;600;700&family=Delius&family=Knewave&display=swap" rel="stylesheet">
</head>
<body>
    <header>Atividades escolares</header>
    <div id="Principal">
    </div>
    <script>
        const divumlayot = document.getElementById("Principal")
        const materias = ["front","ciencia","daniela","outros"]
        const titulos = ["Front-End","Ciência da Computação","Materias da Daniela","Outras materias"]
        const descricoes = [
            "Materia onde supostamente o Grande Fabio Dias ensina HTML e Java Script. Aqui está todos os Layouts que fiz durante tais aulas",
            "Materia onde supostamente o Grande Fabio Dias ensina Linux, Arduino, Sistemas Operacionais, Rede de computadores e outras coisas. Aqui está todos os slides que ele pedio como avaliação",
            "Sem comentarios ainda! :(",
            "Algumas coisas que fiz mas que seriam muito poucas pra dividir por materia",
        ]

        for (let i = 0; i < materias.length; i++) {
            const materia = materias[i]
            const descricao = descricoes[i]
            const titulo = titulos[i]
            
            divumlayot.innerHTML += `
            <div id="${materia}" class="materia">
                <h3>${titulo}</h3>
                <a href="./${materia}/index.html">
                    <div id="${materia}" class="conteudo">
                        <img src="./${materia}/thumb.png" alt="">
                        <p>${descricao}</p>
                    </div>
                </a>
            </div>
            `
        }
    </script>
</body>
</html>
